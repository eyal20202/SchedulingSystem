spring:
  application:
    name: scheduling-system-test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

  quartz:
    job-store-type: memory
    
server:
  port: 8080

logging:
  level:
    root: WARN
    com.scheduling: DEBUG
